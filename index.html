<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>AI 小小殭屍倖存者 p5.js 範例 v16 按鍵修正版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.8/lib/p5.min.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111827;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto !important;
        height: auto !important;
        box-shadow: 0 20px 50px rgba(0,0,0,.35);
        border-radius: 12px;
        touch-action: none;
        outline: none;
      }
    </style>
  </head>
  <body>
    <script src="sketch.js?v=16"></script>
    <script>
      document.addEventListener("touchmove", function (e) {
        e.preventDefault();
      }, { passive: false });
    </script>
  </body>
</html>
